{% extends 'home.html' %}
{% from './macros.html' import rec, recb, unrec, unrecb %}

{% block guide %}
<div class="guide-stack">
    <section class="section guide-hero card">
        {% block material %}{% endblock %}
    </section>

    <section class="section section-card">
        <h3 class="section-title">Top Recommendations</h3>
        <div class="recommendation-list">
            {% block recs %}{% endblock %}
        </div>
    </section>

    <section class="section section-card">
        <h3 class="section-title">Stray Away From</h3>
        <div class="recommendation-list">
            {% block unrecs %}{% endblock %}
        </div>
    </section>

    <section class="section section-card">
        {% block process %}{% endblock %}
    </section>
</div>
{% endblock %}
